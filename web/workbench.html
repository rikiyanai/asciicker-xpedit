<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pipeline V2 Workbench</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="wrap">
  <h1>Workbench</h1>

  <div class="panel">
    <div class="row">
      <button id="btnLoad">Load From Job</button>
      <button id="btnExport" disabled>Export XP</button>
      <a href="/">Back to Wizard</a>
    </div>
    <div id="wbStatus" class="small warn">No active session</div>
  </div>

  <div class="panel">
    <h3>Session</h3>
    <pre id="sessionOut"></pre>
  </div>

  <div class="panel">
    <h3>Grid</h3>
    <div id="grid" class="grid"></div>
  </div>

  <div class="panel">
    <h3>Export</h3>
    <pre id="exportOut"></pre>
  </div>
</div>
<script src="/workbench.js"></script>
</body>
</html>
