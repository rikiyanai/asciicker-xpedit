name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Compile-check critical server files
        run: |
          python3 -m py_compile src/pipeline_v2/app.py
          python3 -m py_compile src/pipeline_v2/service.py
          python3 -m py_compile src/pipeline_v2/config.py
          python3 -m py_compile src/pipeline_v2/models.py
          python3 -m py_compile src/pipeline_v2/xp_codec.py
          python3 -m py_compile src/pipeline_v2/gates.py
          python3 -m py_compile src/pipeline_v2/renderer.py
          python3 -m py_compile src/pipeline_v2/storage.py
          python3 -m py_compile wsgi.py

      - name: Run pytest (excluding e2e)
        run: python3 -m pytest --ignore=tests/e2e -q

      - name: Validate semantic maps
        run: python3 scripts/validate_semantic_maps.py

  js-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check critical JS files
        run: |
          node --check web/workbench.js
          node --check web/wizard.js
          node --check web/termpp_skin_lab.js
          node --check web/termpp_flat_map_bootstrap.js
