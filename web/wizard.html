<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pipeline V2 Wizard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="wrap">
  <h1>Pipeline V2 Wizard</h1>

  <div class="panel">
    <h3>1) Upload</h3>
    <div class="row">
      <input id="file" type="file" accept=".png">
      <button id="btnUpload" class="primary">Upload</button>
    </div>
    <div id="uploadOut" class="small"></div>
  </div>

  <div class="panel">
    <h3>2) Analyze</h3>
    <button id="btnAnalyze" class="primary" disabled>Analyze Uploaded Image</button>
    <pre id="analyzeOut"></pre>
  </div>

  <div class="panel">
    <h3>3) Run</h3>
    <div class="row">
      <div><label>Name</label><input id="name" value="sprite_v2"></div>
      <div><label>Angles</label><input id="angles" value="1"></div>
      <div><label>Frames CSV</label><input id="frames" value="1"></div>
      <div><label>Source Projs</label><input id="sourceProjs" value="1"></div>
      <div><label>Render Res</label><input id="renderRes" value="24"></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <button id="btnRun" class="success" disabled>Run Pipeline</button>
      <button id="btnOpenWorkbench" disabled>Open in Workbench</button>
    </div>
    <div id="runStatus" class="small">Idle</div>
    <pre id="runOut"></pre>
  </div>
</div>
<script src="/wizard.js"></script>
</body>
</html>
