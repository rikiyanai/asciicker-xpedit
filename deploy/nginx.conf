# Nginx reverse proxy for asciicker XP editor
#
# Usage:
#   Include or symlink into /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes the Flask app is running on 127.0.0.1:5071 via gunicorn.
# Replace xpedit.example.com / rikiworld.com with your actual domain.
#
# Two hosting modes are shown below. Enable ONE.

# ── Mode A: Subdomain / root hosting (PIPELINE_BASE_PATH="") ──

server {
    listen 80;
    server_name xpedit.example.com;

    # Redirect HTTP → HTTPS (uncomment when TLS is configured)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5071;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional: serve runtime assets directly for better performance
    # location /termpp-web-flat/ {
    #     alias /opt/asciicker-pipeline-v2/runtime/termpp-skin-lab-static/termpp-web-flat/;
    #     expires 1h;
    # }
}

